services:
  beszel-agent:
    image: henrygd/beszel-agent-nvidia:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/var/lib/beszel-agent
      # monitor other disks / partitions by mounting a folder in /extra-filesystems
      # - /mnt/disk/.beszel:/extra-filesystems/sda1:ro
    # 环境配置参考: https://beszel.dev/zh/guide/agent-installation
    environment:
      LISTEN: 45876
      KEY: <changeme>
      TOKEN: <changeme>
      HUB_URL: <changeme>
    # 挂载需要查看 S.M.A.R.T. 的设备
    devices:
      - /dev/sda:/dev/sda
      - /dev/sdb:/dev/sdb
      - /dev/nvme0:/dev/nvme0
    cap_add:
      - SYS_RAWIO # S.M.A.R.T. 数据所需
      - SYS_ADMIN # NVMe S.M.A.R.T. 数据所需
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - utility
networks: {}
