services:
  gpt-load:
    image: tbphp/gpt-load:latest
    container_name: gpt-load
    user: 1000:1000
    ports:
      - 5105:3001
    env_file:
      - ./.env
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    stop_grace_period: 10s
    healthcheck:
      test: wget -q --spider -T 10 -O /dev/null http://localhost:3001/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
networks: {}
