##### 应用工具配置 #####
server {
    listen 80;
    # [修改点 1] 你的域名
    server_name files.<changeme>;

    # 解除上传限制 (Filebrowser, Immich 必需)
    # 放在 server 块级，确保对所有 location 生效
    client_max_body_size 0;

    location / {
        # [修改点 2] 你的服务端口
        proxy_pass http://127.0.0.1:5100;

        include /opt/stacks/nginx-common.conf;
        
        # 某些应用可能需要重定向修正 (通常保持 off)
        proxy_redirect off;
    }
}

