services:
  uptime-kuma:
    restart: unless-stopped
    ports:
      - 5002:3001
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: uptime-kuma
    image: louislam/uptime-kuma:2
volumes:
  uptime-kuma:
    external: true
    name: uptime-kuma
networks:
  dockge_default:
    external: true
